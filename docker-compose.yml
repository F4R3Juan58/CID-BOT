version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: cid-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cid-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cid-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-3001}:3001'
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cid-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: cid-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-5173}:80'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cid-network

networks:
  cid-network:
    driver: bridge
